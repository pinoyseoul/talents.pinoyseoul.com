<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Seoul Talents</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0a0a12;
            color: #e8e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }

        .container {
            max-width: 500px;
        }

        h1 {
            font-size: 8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f7a8b8 0%, #c084fc 50%, #818cf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 16px;
        }

        p {
            color: #9a9ab8;
            font-size: 1.1rem;
            margin-bottom: 32px;
        }

        a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #f7a8b8, #c084fc, #7c3aed);
            color: #fff;
            font-weight: 700;
            padding: 14px 28px;
            border-radius: 9999px;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(192, 132, 252, 0.3);
        }

        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(192, 132, 252, 0.45);
        }
    </style>
</head>
